
on:
  push:
    branches: [master]
  workflow_dispatch:


jobs:
  windows-test-job:
    runs-on: windows-latest

    steps:
      - run: echo "Hello"

      - name: hostfxr.dll
        shell: cmd
        run: dir "C:\Program Files\dotnet\host\fxr" # dir "C:\Program Files\dotnet\host\fxr\10.0.3"
            

          
  linux-test-job:
    runs-on: ubuntu-latest
    
    steps:
      - run: echo "Hello"
      
      - name: Test
        run: |
          FXR_PATH=$(printf ":%s" /usr/share/dotnet/host/fxr/8.*)
          FXR_PATH=${FXR_PATH:1}

          echo ${FXR_PATH}

      #- name: hostfxr
      #  run: sudo find / -name libhostfxr.so

  
  linux-arm-test-job:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          repository: LazyPanda07/WebFramework
          ref: dev
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y uuid-dev
      
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install build with pip
        run: python -m pip install build

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../WebFrameworkLibrary -DWITH_STACKTRACE=ON -G "Ninja" ..
          cmake --build . -j
          cmake --install .


    
